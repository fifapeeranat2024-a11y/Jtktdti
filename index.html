<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EGO HUB</title>

    <link rel="icon" type="image/jpeg" href="https://i.ibb.co/C5kbyRqx/Screenshot-2026-03-07-03-10-53-83-680d03679600f7af0b4c700c6b270fe7.jpg">
    <link rel="apple-touch-icon" href="https://i.ibb.co/C5kbyRqx/Screenshot-2026-03-07-03-10-53-83-680d03679600f7af0b4c700c6b270fe7.jpg">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prettier/2.8.8/standalone.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prettier/2.8.8/parser-babel.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&family=Fira+Code:wght@400;500&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020617; color: #e2e8f0; -webkit-user-select: none; user-select: none; margin: 0; overflow: hidden; }
        .glass { background: rgba(15, 23, 42, 0.98); backdrop-filter: blur(25px); border: 1px solid rgba(255,255,255,0.1); }
        .terminal { font-family: 'Fira Code', monospace; background: #000; }
        .bar-segment { height: 100%; transition: width 0.4s ease; background: #3b82f6; box-shadow: 0 0 20px #3b82f6; }
        .fade-in { animation: fadeIn 0.6s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .success-log { color: #4ade80; border-left: 3px solid #22c55e; padding-left: 10px; margin-top: 5px; font-size: 11px; }
    </style>
</head>
<body oncontextmenu="return false">

    <div id="loaderScreen" class="fixed inset-0 z-[100] bg-[#020617] flex flex-col items-center justify-center p-6 transition-all duration-500">
        <img src="https://i.ibb.co/C5kbyRqx/Screenshot-2026-03-07-03-10-53-83-680d03679600f7af0b4c700c6b270fe7.jpg" class="w-28 h-28 mb-10 rounded-3xl shadow-2xl">
        <div class="w-full max-w-xs text-center">
            <div class="flex justify-between mb-3 text-[10px] font-black text-blue-500 tracking-[0.3em] uppercase">
                <span>SYSTEM BOOTING</span>
                <span id="loadPercent">0%</span>
            </div>
            <div class="h-2 w-full bg-slate-900 rounded-full overflow-hidden">
                <div id="loadBar" class="bar-segment w-0"></div>
            </div>
        </div>
    </div>

    <div id="authModal" class="fixed inset-0 z-50 hidden flex items-center justify-center p-4 bg-[#020617]/98">
        <div class="glass w-full max-w-md p-10 rounded-[3rem] text-center fade-in border-blue-500/20 shadow-2xl">
            <img src="https://i.ibb.co/C5kbyRqx/Screenshot-2026-03-07-03-10-53-83-680d03679600f7af0b4c700c6b270fe7.jpg" class="w-20 h-20 mx-auto mb-6 rounded-2xl shadow-xl">
            <h2 class="text-3xl font-black text-white italic tracking-tighter mb-8 uppercase">LICENSE REQUIRED</h2>
            <div class="space-y-4">
                <input id="key-input" type="text" placeholder="GGG-XXXXX-XXXX" class="w-full p-5 rounded-2xl bg-slate-950 border border-slate-800 outline-none text-center font-mono text-blue-400 tracking-widest text-sm focus:border-blue-500 transition-all">
                <button onclick="verifyKey()" class="w-full bg-blue-600 p-5 rounded-2xl font-black text-white hover:bg-blue-500 shadow-xl shadow-blue-600/30 active:scale-95 transition-all">AUTHORIZE ACCESS</button>
            </div>
        </div>
    </div>

    <div class="max-w-5xl mx-auto p-6 h-screen flex flex-col opacity-0 transition-all duration-1000" id="mainApp">
        <header class="flex justify-between items-center py-6">
            <div class="flex items-center gap-5">
                <img src="https://i.ibb.co/C5kbyRqx/Screenshot-2026-03-07-03-10-53-83-680d03679600f7af0b4c700c6b270fe7.jpg" class="w-14 h-14 rounded-2xl shadow-2xl">
                <div>
                    <h1 class="text-2xl font-black text-white italic tracking-tighter uppercase">EGO HUB</h1>
                    <div class="text-[10px] font-bold text-green-500 uppercase flex items-center gap-2">
                        <span class="w-1.5 h-1.5 bg-green-500 rounded-full animate-pulse"></span> License Verified
                    </div>
                </div>
            </div>
            <button onclick="localStorage.removeItem('ego_access_key'); location.reload();" class="bg-red-950/20 text-red-500 p-4 rounded-2xl border border-red-500/20"><i data-lucide="power"></i></button>
        </header>

        <div class="flex flex-col lg:flex-row gap-6 flex-grow overflow-hidden pb-6">
            <div class="glass flex-grow p-6 rounded-[3rem] flex flex-col border-white/5 shadow-2xl">
                <div class="flex gap-2 mb-4">
                    <button onclick="oF()" class="bg-blue-600/10 text-blue-400 px-6 py-2 rounded-xl text-[10px] font-black border border-blue-500/20">LOAD FILE</button>
                    <button id="svB" onclick="sF()" class="hidden bg-green-600/20 text-green-400 px-6 py-2 rounded-xl text-[10px] font-black border border-green-500/20">SAVE</button>
                </div>
                <textarea id="ed" class="terminal w-full flex-grow p-8 rounded-[2.5rem] outline-none text-blue-300 resize-none text-sm border border-white/5" placeholder="// System Active..."></textarea>
            </div>
            <div class="lg:w-80 glass rounded-[3rem] flex flex-col overflow-hidden shadow-2xl">
                <div id="tO" class="terminal flex-grow p-6 overflow-y-auto text-[11px] font-mono"></div>
            </div>
        </div>
    </div>

    <script>
        // รหัสล็อกถาวร: GGG-64287-8468
        const _0xK = "R0dHLTY0Mjg3LTg0Njg="; 

        // ระบบป้องกัน Inspect
        (function(){ setInterval(()=>{ (function(){}).constructor("debugger")(); }, 1000); })();

        window.onload = () => {
            let p = 0;
            const i = setInterval(() => {
                p += Math.floor(Math.random()*10)+5;
                if(p >= 100) {
                    p = 100; clearInterval(i);
                    setTimeout(initSession, 500);
                }
                document.getElementById('loadBar').style.width = p+'%';
                document.getElementById('loadPercent').innerText = p+'%';
            }, 50);
            lucide.createIcons();
        };

        function initSession() {
            document.getElementById('loaderScreen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('loaderScreen').style.display = 'none';
                // เช็คว่าเคยใส่รหัสหรือยัง
                if(localStorage.getItem('ego_access_key') === _0xK) {
                    document.getElementById('mainApp').style.opacity = '1';
                    logOk("EGO-System Online.");
                } else {
                    document.getElementById('authModal').classList.remove('hidden');
                }
            }, 500);
        }

        function verifyKey() {
            const input = document.getElementById('key-input').value.trim();
            if(btoa(input) === _0xK) {
                localStorage.setItem('ego_access_key', _0xK);
                document.getElementById('authModal').style.display = 'none';
                document.getElementById('mainApp').style.opacity = '1';
            } else {
                alert("ACCESS DENIED: โค้ดไม่ถูกต้อง");
            }
        }

        async function oF(){try{[window.h]=await window.showOpenFilePicker();const f=await window.h.getFile();document.getElementById('ed').value=await f.text();document.getElementById('svB').classList.remove('hidden');logOk("Loaded: "+f.name);}catch(e){}}
        async function sF(){try{const w=await window.h.createWritable();await w.write(document.getElementById('ed').value);await w.close();logOk("Saved Success.");}catch(e){}}
        function logOk(m){ document.getElementById('tO').innerHTML += `<div class="success-log">[✔] ${m}</div>`; }
    </script>
</body>
</html>
